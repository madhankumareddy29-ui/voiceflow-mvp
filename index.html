<!DOCTYPE html>
<html>
<head>
  <title>VoiceFlow MVP</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>

    body{
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:white;
      margin:0;
      padding:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:#1e293b;
      padding:25px;
      border-radius:18px;
    }

    h1{
      font-size:54px;
    }

    button{
      border:none;
      padding:16px 24px;
      border-radius:14px;
      cursor:pointer;
      font-size:17px;
      font-weight:bold;
      color:white;
    }

    .blue{ background:#2563eb; }
    .red{ background:#dc2626; }
    .green{ background:#16a34a; }
    .purple{ background:#7c3aed; }
    .gray{ background:#64748b; }
    .gold{ background:#f59e0b; color:black; }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:20px;
    }

    textarea{
      width:100%;
      height:320px;
      margin-top:20px;
      border-radius:16px;
      padding:20px;
      font-size:18px;
      border:none;
      box-sizing:border-box;
    }

    select{
      padding:14px;
      border-radius:12px;
      font-size:17px;
      min-width:250px;
    }

    .usage{
      margin-top:15px;
    }

    #status{
      margin-top:20px;
      color:#93c5fd;
      font-weight:bold;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      align-items:center;
      justify-content:center;
    }

    .modal-box{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      max-width:450px;
      text-align:center;
    }

    input{
      padding:12px;
      border-radius:10px;
      border:none;
      width:240px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>🎙️ VoiceFlow MVP</h1>

  <p>
    Speak in your language. Get clean professional English instantly.
  </p>

  <div id="authBox" style="margin-top:20px;">

    <input id="email" placeholder="Email"/>

    <input
      id="password"
      type="password"
      placeholder="Password"
    />

    <button class="blue" onclick="signup()">
      Signup
    </button>

    <button class="green" onclick="login()">
      Login
    </button>

    <button class="red" onclick="logout()">
      Logout
    </button>

    <div id="userStatus" style="margin-top:10px;">
    </div>

  </div>

  <div class="controls">

    <button class="blue" onclick="startRecording()">
      Start Recording
    </button>

    <button class="red" onclick="stopRecording()">
      Stop
    </button>

    <button class="green" onclick="cleanText()">
      Clean Text
    </button>

    <button class="purple" onclick="professionalRewrite()">
      AI Rewrite
    </button>

    <button class="gray" onclick="copyText()">
      Copy Text
    </button>

    <button class="gold" onclick="openUpgrade()">
      Upgrade to Pro
    </button>

  </div>

  <div class="controls">

    <select id="language">

      <option value="en-US">
        English - US
      </option>

      <option value="te-IN">
        Telugu
      </option>

      <option value="hi-IN">
        Hindi
      </option>

    </select>

    <select id="tone">

      <option value="Professional">
        Professional
      </option>

      <option value="Casual">
        Casual
      </option>

      <option value="Executive">
        Executive
      </option>

      <option value="Polite">
        Polite
      </option>

      <option value="Concise">
        Concise
      </option>

      <option value="Gen Z">
        Gen Z
      </option>

      <option value="Email">
        Email
      </option>

    </select>

  </div>

  <div class="usage" id="usage"></div>

  <div id="status">
    Ready
  </div>

  <textarea id="output"></textarea>

</div>

<div class="modal" id="upgradeModal">

  <div class="modal-box">

    <h2>
      Upgrade to Pro 🚀
    </h2>

    <p>
      You reached the free limit.
    </p>

    <button class="gold">
      Upgrade Now
    </button>

    <button class="gray" onclick="closeUpgrade()">
      Close
    </button>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyA_h-rYvoL2dZs-9Q9cNdTQFfjAQpnfdII",

  authDomain: "voiceflow-ai-1c0e8.firebaseapp.com",

  projectId: "voiceflow-ai-1c0e8",

  storageBucket: "voiceflow-ai-1c0e8.firebasestorage.app",

  messagingSenderId: "911732232577",

  appId:
    "1:911732232577:web:2c538a95eb270619839880",

  measurementId: "G-YY94W8GM6B"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.signup = async function(){

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  try{

    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Signup successful!");

  }catch(err){

    alert(err.message);

  }

}

window.login = async function(){

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Login successful!");

  }catch(err){

    alert(err.message);

  }

}

window.logout = async function(){

  await signOut(auth);

}

onAuthStateChanged(auth,(user)=>{

  if(user){

    document.getElementById("userStatus").innerText =
      "Logged in: " + user.email;

  }else{

    document.getElementById("userStatus").innerText =
      "Not logged in";

  }

});

const FREE_LIMIT = 10;

let rewriteCount =
  Number(localStorage.getItem("rewriteCount") || 0);

updateUsage();

function updateUsage(){

  document.getElementById("usage").innerText =
    "Free Plan: " +
    rewriteCount +
    " / " +
    FREE_LIMIT +
    " rewrites used today";

}

window.cleanText = function(){

  const cleaned =
    document.getElementById("output").value
      .replace(/\s+/g," ")
      .trim();

  document.getElementById("output").value =
    cleaned;

}

window.professionalRewrite = async function(){

  if(rewriteCount >= FREE_LIMIT){

    openUpgrade();

    return;

  }

  const text =
    document.getElementById("output").value;

  const tone =
    document.getElementById("tone").value;

  document.getElementById("status").innerText =
    "AI rewriting...";

  try{

    const response = await fetch(
      "https://voiceflow-mvp.onrender.com/rewrite",
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          text,
          tone
        })
      }
    );

    const data = await response.json();

    document.getElementById("output").value =
      data.result;

    rewriteCount++;

    localStorage.setItem(
      "rewriteCount",
      rewriteCount
    );

    updateUsage();

    document.getElementById("status").innerText =
      "AI rewrite complete!";

  }catch(err){

    document.getElementById("status").innerText =
      "AI rewrite failed.";

  }

}

window.copyText = function(){

  navigator.clipboard.writeText(
    document.getElementById("output").value
  );

}

window.openUpgrade = function(){

  document.getElementById("upgradeModal").style.display =
    "flex";

}

window.closeUpgrade = function(){

  document.getElementById("upgradeModal").style.display =
    "none";

}

let recognition;

window.startRecording = function(){

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  recognition = new SpeechRecognition();

  recognition.lang =
    document.getElementById("language").value;

  recognition.continuous = true;

  recognition.onresult = (event)=>{

    let transcript = "";

    for(let i=0;i<event.results.length;i++){

      transcript +=
        event.results[i][0].transcript + " ";

    }

    document.getElementById("output").value =
      transcript;

  };

  recognition.start();

  document.getElementById("status").innerText =
    "Listening...";

}

window.stopRecording = function(){

  if(recognition){

    recognition.stop();

  }

  document.getElementById("status").innerText =
    "Recording stopped";

}

</script>

</body>
</html>
