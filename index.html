<!DOCTYPE html>
<html>
<head>
  <title>VoiceFlow AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:white;margin:0;padding:20px;}
    .container{max-width:1400px;margin:auto;background:#1e293b;padding:30px;border-radius:22px;}
    h1{font-size:72px;margin:0;}
    p{font-size:22px;color:#dbeafe;}
    .controls{display:flex;flex-wrap:wrap;gap:16px;margin-top:25px;}
    button{border:none;padding:18px 28px;border-radius:18px;cursor:pointer;font-size:18px;font-weight:bold;color:white;}
    .blue{background:#2563eb}.red{background:#dc2626}.green{background:#16a34a}.purple{background:#7c3aed}.gray{background:#64748b}
    select{padding:16px;border-radius:14px;font-size:18px;min-width:320px;border:none;}
    textarea{width:100%;height:320px;margin-top:25px;border-radius:24px;padding:24px;font-size:20px;border:none;resize:vertical;box-sizing:border-box;line-height:1.7;}
    input{padding:18px;border-radius:14px;border:none;width:320px;font-size:18px;}
    #status{margin-top:24px;color:#93c5fd;font-size:22px;font-weight:bold;}
    .usage{margin-top:18px;font-size:22px;}
    .history{margin-top:35px;background:#334155;padding:22px;border-radius:22px;}
    .history h2{margin-top:0;font-size:46px;}
    .history-item{background:#1e293b;padding:18px;border-radius:16px;margin-top:14px;font-size:18px;}
  </style>
</head>

<body>
<div class="container">
  <h1>🎙️ VoiceFlow AI</h1>
  <p>Speak naturally. Sound professional instantly.</p>

  <div class="controls">
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button class="blue" id="signupBtn" onclick="signup()">Signup</button>
    <button class="green" id="loginBtn" onclick="login()">Login</button>
    <button class="red" id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    <button class="purple" id="upgradeBtn">🚀 Upgrade Pro</button>
  </div>

  <div id="userStatus" style="margin-top:18px;font-size:20px;">Not logged in</div>

  <div class="controls" id="appControls">
  <button class="blue" id="recordBtn" onclick="startRecording()">🎤 Start Recording</button>
    <button class="red" onclick="stopRecording()">⏹ Stop</button>
    <button class="green" onclick="cleanText()">✨ Clean Text</button>
    <button class="purple" onclick="professionalRewrite()">✨ AI Rewrite</button>
    <button class="gray" onclick="copyText()">📋 Copy Text</button>
  </div>

  <div class="controls" id="toneControls">
  <select id="tone">
      <option value="Professional">Professional</option>
      <option value="Casual">Casual</option>
      <option value="Executive">Executive</option>
      <option value="Polite">Polite</option>
      <option value="Concise">Concise</option>
      <option value="Gen Z">Gen Z</option>
      <option value="Email">Email</option>
    </select>
  </div>

  <div class="usage" id="usage"></div>
  <div id="status">Ready</div>
  <textarea id="output"></textarea>

  <div class="history" id="historySection">
    <h2>Recent Rewrites</h2>
    <div id="historyList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const API_BASE = "https://voiceflow-mvp.onrender.com";

const firebaseConfig = {
  apiKey: "AIzaSyA_h-rYvoL2dZs-9Q9cNdTQFfjAQpnfdII",
  authDomain: "voiceflow-ai-1c0e8.firebaseapp.com",
  projectId: "voiceflow-ai-1c0e8",
  storageBucket: "voiceflow-ai-1c0e8.firebasestorage.app",
  messagingSenderId: "911732232577",
  appId: "1:911732232577:web:2c538a95eb270619839880"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

const FREE_LIMIT = 10;
let rewriteCount = 0;
let currentPlan = "free";
let mediaRecorder;
let audioChunks = [];

// keep Render awake while user is on app
async function keepServerAwake(){
  try{
    await fetch(API_BASE + "/", { method:"GET", cache:"no-store" });
    console.log("Server awake");
  }catch(err){
    console.log("Keep alive failed");
  }
}

keepServerAwake();
setInterval(keepServerAwake, 5 * 60 * 1000);

function setAuthUI(isLoggedIn){
  document.getElementById("email").style.display = isLoggedIn ? "none" : "inline-block";
  document.getElementById("password").style.display = isLoggedIn ? "none" : "inline-block";
  document.getElementById("signupBtn").style.display = isLoggedIn ? "none" : "inline-block";
  document.getElementById("loginBtn").style.display = isLoggedIn ? "none" : "inline-block";
  document.getElementById("logoutBtn").style.display = isLoggedIn ? "inline-block" : "none";
document.getElementById("appControls").style.display =
  isLoggedIn ? "flex" : "none";

document.getElementById("toneControls").style.display =
  isLoggedIn ? "flex" : "none";

document.getElementById("usage").style.display =
  isLoggedIn ? "block" : "none";

document.getElementById("output").style.display =
  isLoggedIn ? "block" : "none";
document.getElementById("historySection").style.display =
  isLoggedIn ? "block" : "none";
}

function updateUsage(){
  if(currentPlan === "pro"){
    document.getElementById("usage").innerText = "🚀 Pro Plan: Unlimited rewrites";
    document.getElementById("upgradeBtn").style.display = "none";
  }else{
    document.getElementById("usage").innerText =
      "Free Plan: " + rewriteCount + " / " + FREE_LIMIT + " rewrites used today";
    document.getElementById("upgradeBtn").style.display = "inline-block";
  }
}

setAuthUI(false);
updateUsage();

window.signup = async function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please enter email and password.");
    return;
  }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth,email,password);
    const user = userCredential.user;

    await setDoc(doc(db,"users",user.uid),{
      email:user.email,
      plan:"free",
      pro:false,
      rewritesToday:0
    });

    rewriteCount = 0;
    currentPlan = "free";
    updateUsage();

    alert("Signup successful!");
  }catch(err){
    alert(err.message);
  }
}

window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please enter email and password.");
    return;
  }

  try{
    await signInWithEmailAndPassword(auth,email,password);
    alert("Login successful!");
  }catch(err){
    alert(err.message);
  }
}

window.logout = async function(){
  await signOut(auth);
  rewriteCount = 0;
  currentPlan = "free";
  updateUsage();
  setAuthUI(false);
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";
  document.getElementById("output").value = "";
  document.getElementById("status").innerHTML = "Logged out.";
  document.getElementById("userStatus").innerText =
  "Please login to start using VoiceFlow AI.";
}

onAuthStateChanged(auth, async (user)=>{
  if(user){
    setAuthUI(true);

    document.getElementById("userStatus").innerText =
      "Logged in: " + user.email;

    const uidRef = doc(db,"users",user.uid);
    const emailRef = doc(db,"users",user.email);

    const uidSnap = await getDoc(uidRef);
    const emailSnap = await getDoc(emailRef);

    if(emailSnap.exists() && emailSnap.data().plan === "pro"){
      currentPlan = "pro";
      rewriteCount = emailSnap.data().rewritesToday || 0;

      await setDoc(uidRef,{
        email:user.email,
        plan:"pro",
        pro:true
      },{merge:true});

    }else if(uidSnap.exists()){
      currentPlan = uidSnap.data().plan || "free";
      rewriteCount = uidSnap.data().rewritesToday || 0;
    }else{
      currentPlan = "free";
      rewriteCount = 0;

      await setDoc(uidRef,{
        email:user.email,
        plan:"free",
        pro:false,
        rewritesToday:0
      });
    }

    updateUsage();

 }else{
    setAuthUI(false);
    document.getElementById("userStatus").innerText =
      "Please login to start using VoiceFlow AI.";
    document.getElementById("status").innerHTML = "Ready";
    rewriteCount = 0;
    currentPlan = "free";
    updateUsage();
  }
});

window.cleanText = function(){
  const cleaned = document.getElementById("output").value.replace(/\s+/g," ").trim();
  document.getElementById("output").value = cleaned;
  document.getElementById("status").innerHTML = "✨ Text cleaned";
}

window.professionalRewrite = async function(){

  const user = auth.currentUser;

  if(!user){
    document.getElementById("status").innerHTML =
      "❌ Please login first to use AI Rewrite.";
    return;
  }

  const text = document.getElementById("output").value.trim();

  if(!text){
    document.getElementById("status").innerHTML =
      "❌ Please speak or type something first.";
    return;
  }
  if(currentPlan !== "pro" && rewriteCount >= FREE_LIMIT){
    document.getElementById("status").innerHTML =
      "🚀 Free limit reached. Please upgrade to Pro.";
    return;
  }

  const tone = document.getElementById("tone").value;

  document.getElementById("status").innerHTML =
    "⏳ AI rewriting...";

  try{
    const response = await fetch(
      API_BASE + "/rewrite",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          text,
          tone
        })
      }
    );

    const data = await response.json();

    if(!data.result){
      document.getElementById("status").innerHTML =
        "❌ Rewrite failed.";
      return;
    }

    document.getElementById("output").value = data.result;

    if(currentPlan !== "pro"){
      rewriteCount++;
    }

    const user = auth.currentUser;

    if(user){
      await setDoc(
        doc(db,"users",user.uid),
        {
          email:user.email,
          plan:currentPlan,
          pro: currentPlan === "pro",
          rewritesToday:rewriteCount
        },
        {merge:true}
      );
    }

    updateUsage();

    document.getElementById("status").innerHTML =
      "✅ AI rewrite complete!";

    addToHistory(data.result);

  }catch(err){
    console.error(err);
    document.getElementById("status").innerHTML =
      "❌ Rewrite failed. Server may be waking up. Try again in 30 seconds.";
  }
}

function addToHistory(text){
  const div = document.createElement("div");
  div.className = "history-item";
  div.innerText = text;
  document.getElementById("historyList").prepend(div);
}

window.copyText = function(){
  navigator.clipboard.writeText(document.getElementById("output").value);
  document.getElementById("status").innerHTML = "📋 Copied!";
}

window.startRecording = async function(){
  document.getElementById("output").value = "";

  try{
    document.getElementById("status").innerHTML =
      "🎤 Requesting microphone...";

    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = (event)=>{
      audioChunks.push(event.data);
    };

    mediaRecorder.onstop = async ()=>{
      document.getElementById("status").innerHTML =
        "📤 Uploading audio...";

      const audioBlob = new Blob(audioChunks,{type:"audio/webm"});
      const formData = new FormData();
      formData.append("audio",audioBlob,"voice.webm");

      try{
        document.getElementById("status").innerHTML =
          "🤖 Transcribing with Whisper... please wait";

        const response = await fetch(API_BASE + "/transcribe",{
          method:"POST",
          body:formData
        });

        const data = await response.json();

        if(!data.text){
          document.getElementById("status").innerHTML =
            "❌ No speech detected. Try again.";
          return;
        }

        document.getElementById("output").value = data.text || "";
        document.getElementById("status").innerHTML =
          "✅ Voice transcribed successfully!";

      }catch(err){
        console.error(err);
        document.getElementById("status").innerHTML =
          "❌ Whisper is taking too long. Server may be waking up. Try again in 30 seconds.";
      }
    };

    mediaRecorder.start();
    document.getElementById("recordBtn").disabled = true;
    document.getElementById("status").innerHTML = "🎤 Recording...";

  }catch(err){
    console.error(err);
    alert("Microphone permission required.");
  }
}

window.stopRecording = function(){
  if(mediaRecorder && mediaRecorder.state !== "inactive"){
    document.getElementById("status").innerHTML = "⏳ Preparing audio...";
    mediaRecorder.stop();
    document.getElementById("recordBtn").disabled = false;
  }
}

document
  .getElementById("upgradeBtn")
  .addEventListener("click", async ()=>{

    const user = auth.currentUser;
    const email = user ? user.email : document.getElementById("email").value.trim();

    if(!email){
      alert("Please login or enter email first.");
      return;
    }

    try{
      const response = await fetch(
        API_BASE + "/create-checkout-session",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            email:email
          })
        }
      );

      const data = await response.json();

      if(data.url){
        window.location.href = data.url;
      }else{
        alert("Stripe checkout failed");
      }

    }catch(err){
      console.error(err);
      alert("Stripe checkout failed");
    }
});
</script>

</body>
</html>
